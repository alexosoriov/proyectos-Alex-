<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CompletApp ULTRA PRO 🎉</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
<img src="assets/icon.png" alt="logo">
<h1>CompletApp ULTRA PRO</h1>
</header>

<nav>
<button onclick="mostrar('calculadora')">Calculadora</button>
<button onclick="mostrar('carrete')">Carrete</button>
<button onclick="mostrar('lista')">Lista</button>
<button onclick="mostrar('ranking')">Ranking</button>
</nav>

<main>
<div id="calculadora" class="card">
<h2>🌭 Calculadora de Completos</h2>
<input id="personas" type="number" placeholder="Personas">
<input id="porpersona" type="number" placeholder="Completos por persona">
<select id="tipo">
<option value="completo">Completo</option>
<option value="italiano">Italiano</option>
<option value="dinamico">Dinámico</option>
</select>
<input id="pesoPalta" type="number" value="200" placeholder="Peso palta promedio (g)">
<button class="calc" onclick="calcular()">Calcular</button>
<div id="resultado" class="result"></div>
</div>

<div id="carrete" class="card hidden">
<h2>🥂 Calculadora de Carrete (IA)</h2>
<input id="personasCarrete" type="number" placeholder="Personas">
<select id="tipoCarrete">
<option value="completo">Completo</option>
<option value="italiano">Italiano</option>
<option value="dinamico">Dinámico</option>
</select>
<button class="calc" onclick="carreteIA()">Calcular Carrete</button>
<div id="resultadoCarrete" class="result"></div>
</div>

<div id="lista" class="card hidden">
<h2>🛒 Lista de compras</h2>
<div id="listaCompras" class="result"></div>
<button class="calc" onclick="compartirWhatsApp()">Compartir por WhatsApp</button>
</div>

<div id="ranking" class="card hidden">
<h2>🏆 Ranking de Completes</h2>
<table>
<tr><th>Tipo</th><th>Puntos</th></tr>
<tr><td>Italiano</td><td>10</td></tr>
<tr><td>Dinámico</td><td>9</td></tr>
<tr><td>Especial</td><td>8</td></tr>
<tr><td>Completo solo</td><td>6</td></tr>
</table>
</div>
</main>

<footer>
© 2026 Alex Osorio | CompletApp
</footer>

<script src="js/main.js"></script>
</body>
</html>
